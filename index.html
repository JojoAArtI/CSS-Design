<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSS Designer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace'],
          },
          colors: {
            neutral: {
              950: '#0a0a0a',
              900: '#171717',
              800: '#262626',
              700: '#404040',
              600: '#525252',
              500: '#737373',
              400: '#a3a3a3',
              300: '#d4d4d4',
              200: '#e5e5e5',
            },
            playground: {
              bg: '#0a0a0a',
              card: 'rgba(23, 23, 23, 0.6)',
              border: 'rgba(38, 38, 38, 1)',
              accent: '#ffffff',
              muted: '#737373',
              text: '#d4d4d4'
            }
          },
          backgroundImage: {
            'grid-pattern': "linear-gradient(to right, #171717 1px, transparent 1px), linear-gradient(to bottom, #171717 1px, transparent 1px)",
          },
          letterSpacing: {
            tightest: '-0.05em',
            widest: '0.1em',
            'tracking-[0.2em]': '0.2em',
          },
          animation: {
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'spin-slow': 'spin 8s linear infinite',
          },
          transitionTimingFunction: {
            'memoria-main': 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
            'memoria-questionnaire': 'cubic-bezier(0.25, 0.1, 0.25, 1)',
            'memoria-accordion': 'cubic-bezier(0.4, 0, 0.2, 1)',
            'memoria-glow': 'cubic-bezier(0.16, 1, 0.3, 1)',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0a0a0a;
      color: #d4d4d4;
      overflow: hidden;
    }

    .nebula-card {
      background: rgba(23, 23, 23, 0.6);
      border: 1px solid rgba(38, 38, 38, 1);
      border-radius: 12px;
      /* xl per Memoria */
      transition: border-color 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94), background-color 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .nebula-card:hover {
      border-color: rgba(64, 64, 64, 1);
      background: rgba(38, 38, 38, 0.5);
    }

    /* Minimal White Slider */
    input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      background: transparent;
    }

    input[type=range]:focus {
      outline: none;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      height: 12px;
      width: 12px;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
      margin-top: -4px;
      transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    input[type=range]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type=range]::-webkit-slider-runnable-track {
      width: 100%;
      height: 4px;
      cursor: pointer;
      background: #262626;
      border-radius: 2px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #262626;
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #404040;
    }

    .text-blur-in {
      animation: text-blur-in 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes text-blur-in {
      0% {
        opacity: 0;
        filter: blur(10px);
      }

      100% {
        opacity: 1;
        filter: blur(0px);
      }
    }

    @keyframes border-beam {
      100% {
        offset-distance: 100%;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "path": "https://esm.sh/path@0.12.7",
    "vite": "https://esm.sh/vite@5.1.6",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@4.2.1",
    "react/": "https://esm.sh/react@18.2.0/",
    "react": "https://esm.sh/react@18.2.0",
    "lucide-react": "https://esm.sh/lucide-react@0.263.1",
    "framer-motion": "https://esm.sh/framer-motion@10.16.4",
    "clsx": "https://esm.sh/clsx@2.0.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@1.14.0"
  }
}
</script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
